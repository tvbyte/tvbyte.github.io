<body>

<div id="preloader"><span class="loader"></span></div>

<div class="main-container" id="mainApp">
    <div class="content-area">
        <div class="video-player-container" id="playerContainer">
            <div class="player-loader" id="playerLoader"><div class="spinner"></div></div>
            
            <div id="player-poster"></div>

            <div id="error-display">
                <div class="error-content">
                    <i class="fas fa-exclamation-triangle error-icon"></i>
                    <div class="error-text">Stream Not Available</div>
                </div>
            </div>

            <video id="video-player" autoplay></video>
            <div id="qualityMenu" class="quality-menu"></div>
            
            <div id="watermark" class="player-watermark">
                <div class="glass-brand">
                    <div class="brand-main-text">LiveFY  IPTV</div>
                </div>
            </div>

            <div id="controls" class="custom-controls">
                <button class="control-btn" id="playPauseBtn"><i class="fas fa-pause"></i></button>
                <div class="live-text"><span class="live-dot"></span> LIVE</div>
                <div class="spacer"></div>
                <button class="control-btn" id="qualityBtn"><i class="fas fa-cog"></i></button>
                <div class="volume-box">
                    <button class="control-btn" id="muteBtn"><i class="fas fa-volume-up"></i></button>
                    <input type="range" id="volumeSlider" min="0" max="1" step="0.1" value="1">
                </div>
                <button class="control-btn" id="fullScreenBtn"><i class="fas fa-expand"></i></button>
            </div>
        </div>

        <div class="ad-ticker-container">
            <div class="ad-label">NOTICE</div>
            <div class="ticker-wrap">
                <div class="ad-ticker-text">LiveFY  IPTV — উপভোগ করুন বাফারিংহীন লাইভ টিভি। সব চ্যানেল এখন হাতের মুঠোয়!</div>
            </div>
        </div>
    </div>

    <div class="sidebar">
        <div class="sidebar-header">
            <div class="channel-stats">
                <i class="fas fa-tv"></i> Channels: <span id="totalChannelCount">0</span>
            </div>
           
        </div>

        <nav class="category-nav">
            <ul id="categoryList">
                <li data-category="bangla" class="active">Bangla</li>
                <li data-category="sports">Sports</li>
                <li data-category="india">India</li>
                <li data-category="kolkata">Kolkata</li>
                <li data-category="others">Others</li>
            </ul>
        </nav>
        <div class="channel-grid" id="channelGrid"></div>
    </div>
</div>

<!-- GitHub Hit Counter & Copyright Footer -->

    <div class="footer-text">
        © Copyright 2026, Developed
    </div>
</div>
