<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>TorongoPlus PRO</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest">
  </script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
 <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="hdr_nurmd2006">
    <div class="logo_area_nurmd2006">
      <button id="mbtn_nurmd2006" onclick="toggleMenu()"><i class="fa-solid fa-bars"></i></button>
      <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgbg3MhhDt2OPXAxxuH2TmG214FUgVMc8V8YDOTv-dmri-2VcMLjvUZC7xkFlSxI_WOIrvmyzsqjBkHPmYlPYVLuyRIUucw8NG8CPV4l5-GwtJyA5egPXlOnQdl2nLH59B39ERgXEIc7FT0I2ZE3Jq3nrKewjPrYgUEJDdAme2Ti90yZtTyORDKXBlfUA/s943/1000060787.png" alt="TorongoPlus" style="width:140px;height:36px;">
    </div>
    <span id="channelCount_nurmd2006" onclick="refreshAll()" title="Click to refresh">0 channels</span>
  </div>

  <div id="wrap_nurmd2006">
    <div id="shade_nurmd2006" onclick="closeMenu()"></div>
    <div id="side_nurmd2006">
      <div class="sbar_nurmd2006">
        <input id="srch_nurmd2006" type="text" placeholder="Search channel..." oninput="doSearch()">
        <button class="icon_btn_nurmd2006" onclick="toggleFavsFilter()" id="favsFilterBtn_nurmd2006"><i class="fa-solid fa-star"></i></button>
        <button class="icon_btn_nurmd2006" onclick="refreshAll()"><i class="fa-solid fa-rotate"></i></button>
      </div>
      <div class="tabs_nurmd2006" id="tabContainer_nurmd2006"></div>
      <div id="chlist_nurmd2006"></div>
      <div class="footer_bar_nurmd2006">Powered  &copy; 2026 </div>
    </div>
    <div id="main_nurmd2006">
      <div id="player_nurmd2006">
        <video id="vid_nurmd2006" playsinline webkit-playsinline></video>
        <div id="watermark_nurmd2006" onclick="clearStorage()">نور محمد</div>
        <div id="overlay_nurmd2006">
          <div class="spinner_nurmd2006"></div>
          <div class="status_text_nurmd2006" id="statusMsg_nurmd2006">Loading streams...</div>
        </div>
      </div>
      <div id="nowbar_nurmd2006">
        <div id="np_logo_nurmd2006">📡</div>
        <div class="np_info_nurmd2006">
          <div id="np_name_nurmd2006">Select a channel</div>
          <div id="np_meta_nurmd2006"></div>
        </div>
        <div class="ctrl_btns_nurmd2006">
          <button class="ctrl_btn_nurmd2006" onclick="prevChannel()"><i class="fa-solid fa-backward-step"></i></button>
          <button class="ctrl_btn_nurmd2006" onclick="togglePlayPause()" id="playPauseBtn_nurmd2006"><i class="fa-solid fa-play"></i></button>
          <button class="ctrl_btn_nurmd2006" onclick="nextChannel()"><i class="fa-solid fa-forward-step"></i></button>
          <button class="ctrl_btn_nurmd2006" onclick="toggleFullscreen()"><i class="fa-solid fa-expand"></i></button>
        </div>
      </div>
    </div>
  </div>

      <script src="data.js"></script>
<script src="main.js"></script>

</body>
</html>
</body>
</html>
