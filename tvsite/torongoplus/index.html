<script>
// ===== CATEGORY SLIDER FIX - 100% Working =====
(function() {
  
  function attachSliderEvents(slider) {
    if (!slider || slider.dataset.eventsAttached === 'true') return;
    slider.dataset.eventsAttached = 'true';
    
    // Drag scroll
    let isDown = false, startX, scrollLeft;
    
    slider.addEventListener('mousedown', function(e) {
      if (e.target.classList.contains('category-chip')) return;
      isDown = true;
      startX = e.pageX - slider.offsetLeft;
      scrollLeft = slider.scrollLeft;
      slider.style.cursor = 'grabbing';
      e.preventDefault();
    });
    
    document.addEventListener('mouseup', function() {
      if (isDown) {
        isDown = false;
        slider.style.cursor = 'grab';
      }
    });
    
    document.addEventListener('mousemove', function(e) {
      if (!isDown) return;
      e.preventDefault();
      const x = e.pageX - slider.offsetLeft;
      slider.scrollLeft = scrollLeft - (x - startX) * 1.5;
    });
    
    // Wheel scroll
    slider.addEventListener('wheel', function(e) {
      e.preventDefault();
      slider.scrollLeft += e.deltaY * 2;
    }, { passive: false });
    
    slider.style.cursor = 'grab';
  }
  
  // Side menu খোলার সময় slider পাওয়া যায় কিনা check করুন
  const observer = new MutationObserver(function() {
    const slider = document.getElementById('sideCategorySliderWrapper');
    if (slider) {
      attachSliderEvents(slider);
    }
  });
  
  // Category change হলে নতুন slider-এ event লাগবে
  observer.observe(document.body, { childList: true, subtree: true });
  
  // Initial check
  setTimeout(function() {
    const slider = document.getElementById('sideCategorySliderWrapper');
    if (slider) attachSliderEvents(slider);
  }, 1000);
  
  // Side menu toggle হলে পুনরায় check
  const menuToggle = document.getElementById('sideMenuToggle');
  if (menuToggle) {
    menuToggle.addEventListener('click', function() {
      setTimeout(function() {
        const slider = document.getElementById('sideCategorySliderWrapper');
        if (slider) attachSliderEvents(slider);
      }, 500);
    });
  }
  
  // Switch UI button চাপলেও check
  const switchBtn = document.getElementById('switchUIBtn');
  if (switchBtn) {
    switchBtn.addEventListener('click', function() {
      setTimeout(function() {
        const slider = document.getElementById('sideCategorySliderWrapper');
        if (slider) attachSliderEvents(slider);
      }, 800);
    });
  }
  
})();
</script>
